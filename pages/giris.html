<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris / Kayit - Şahinkaya Ahşap</title>
    <link rel="icon" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../css/main.css">

    <script>if(localStorage.getItem('sahinkaya_tema')==='"dark"')document.documentElement.classList.add('dark-mode');</script>
</head>
<body>
<main class="bolum">
    <h2 class="bolum-baslik">Hesap Islemleri</h2>
    <div class="auth-kapsam">
        <div class="form-kutu" id="giris-kutusu">
            <h3 style="margin-bottom:20px; text-align:center;">GIRIS YAP</h3>
            <div class="form-grup"><label>E-Posta</label><input type="email" id="giris-kadi" oninput="this.value = this.value.replace(/\s/g, '')"></div>
            <div class="form-grup"><label>Sifre</label><input type="password" id="giris-sifre" oninput="this.value = this.value.replace(/\s/g, '')" onkeydown="if(event.key === 'Enter') girisYap()"></div>
            <button class="btn-satin-al" onclick="girisYap()">Giris Yap</button>
            <p class="form-link">Hesabiniz yok mu? <a href="javascript:void(0)" onclick="formDegistir('kayit')">Hemen Kaydolun</a></p>
        </div>
        <div class="form-kutu" id="kayit-kutusu" style="display:none;">
            <h3 style="margin-bottom:20px; text-align:center;">KAYIT OL</h3>
            <div class="form-grup"><label>Ad Soyad</label><input type="text" id="kayit-isim"></div>
            <div class="form-grup"><label>E-Posta</label><input type="email" id="kayit-kadi" oninput="this.value = this.value.replace(/\s/g, '')"></div>
            <div class="form-grup"><label>Sifre Belirleyin</label><input type="password" id="kayit-sifre" oninput="this.value = this.value.replace(/\s/g, '')"></div>
            <div class="form-grup"><label>Sifre (Tekrar)</label><input type="password" id="kayit-sifre-tekrar" oninput="this.value = this.value.replace(/\s/g, '')" onkeydown="if(event.key === 'Enter') kayitOl()"></div>
            <button class="btn-satin-al btn-ghost" onclick="kayitOl()">Hesap Olustur</button>
            <p class="form-link">Zaten bir hesabiniz var mi? <a href="javascript:void(0)" onclick="formDegistir('giris')">Giris Yapin</a></p>
        </div>
    </div>
</main>


    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-init.js"></script>
    
<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/shop.js"></script>
<script src="../js/projects.js"></script>
<script src="../js/products.js"></script>
<script src="../js/effects.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
