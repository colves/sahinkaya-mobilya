<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepetim - Şahinkaya Ahşap</title>
    <link rel="icon" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../css/main.css">

    <script>if(localStorage.getItem('sahinkaya_tema')==='"dark"')document.documentElement.classList.add('dark-mode');</script>
</head>
<body>
<main class="bolum">
    <h2 class="bolum-baslik">Alisveris Sepetiniz</h2>
    <div class="tablo-kaydir">
        <table class="tasarim-tablo">
            <thead><tr><th>Ürün Adi</th><th>Fiyat</th><th>Islem</th></tr></thead>
            <tbody id="sepet-tablo-govde"></tbody>
        </table>
    </div>
    <div class="ozet-kutu">
        <div class="ozet-satir"><span>Ara Toplam:</span> <span id="ara-toplam">0 TL</span></div>
        <div class="ozet-satir"><span>KDV (%20):</span> <span id="vergi-tutari">Mevcut fiyata dahildir</span></div>
        <div class="ozet-satir" style="border-top:1px solid var(--kenarlik); padding-top:12px; font-weight:bold;"><span>Genel Toplam:</span> <span id="genel-toplam">0 TL</span></div>
        <button class="btn-satin-al" onclick="siparisiTamamla()">Siparişi Tamamla</button>
    </div>
</main>

</html>
