<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mağaza - Şahinkaya Ahşap</title>
    <link rel="icon" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../css/main.css">

    <script>if(localStorage.getItem('sahinkaya_tema')==='"dark"')document.documentElement.classList.add('dark-mode');</script>
</head>
<body>
<main class="bolum" id="koleksiyonlar">
    <h2 class="bolum-baslik" id="kategori-baslik">ÜRÜNLERİMİZ</h2>
    <div id="filtre-alani" class="filtre-alani" style="display:none;">
        <input type="number" id="min-fiyat" placeholder="Min Fiyat (TL)" style="width:130px;">
        <input type="number" id="max-fiyat" placeholder="Max Fiyat (TL)" style="width:130px;">
        <select id="stok-filtre"><option value="hepsi">Tüm Stoklar</option><option value="stokta">Sadece Stoktakiler</option></select>
        <button class="btn-satin-al btn-oto" style="margin-top:0;" onclick="filtrele()">Filtrele</button>
    </div>
    <div class="urun-grid" id="urun-listesi-izgara"></div>
</main>


    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-init.js"></script>
    
<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/shop.js"></script>
<script src="../js/projects.js"></script>
<script src="../js/products.js"></script>
<script src="../js/effects.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
