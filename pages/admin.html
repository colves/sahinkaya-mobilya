<!DOCTYPE html>


<html lang="tr">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Yönetim Paneli - Şahinkaya Ahşap</title>


    <link rel="icon" href="../assets/img/logo.png">


    <link rel="stylesheet" href="../css/main.css">





    <script>if(localStorage.getItem('sahinkaya_tema')==='"dark"')document.documentElement.classList.add('dark-mode');</script>


</head>


<body>


<main class="bolum">


    <div style="position:relative; height:40px;">


        <button id="btn-ukbe-toggle" class="btn-satin-al btn-oto" style="position:absolute; right:0; top:-20px; z-index:50; display:none; margin-top:0;" onclick="toggleUkbe()">UKBE MODU: KAPALI</button>


    </div>


    <h2 class="bolum-baslik">Yönetim Paneli</h2>


    <div class="admin-tab-menu">


        <button class="admin-tab-btn aktif-tab" onclick="adminTabDegistir(this, 'tab-urunler')">Mağaza Yönetimi</button>


        <button class="admin-tab-btn" onclick="adminTabDegistir(this, 'tab-ayarlar')">Site Ayarlari</button>


        <button class="admin-tab-btn" onclick="adminTabDegistir(this, 'tab-musteriler')">Müşteriler & Yetkiler</button>


    </div>





    <div id="tab-urunler" class="admin-tab-icerik aktif">


        <div class="admin-urun-duzen">


            <div class="form-kutu" style="padding:20px;">


                <h3 style="margin-bottom:16px;">Yeni Ürün Ekle</h3>


                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start;">


                    <!-- Sol Kolon -->


                    <div>


                        <div class="form-grup">


                            <label>Kategoriler</label>


                            <div class="kategori-checkbox-grid">


                                <label><input type="checkbox" class="kat-cb" value="yatak-odasi"> Yatak Odası</label>


                                <label><input type="checkbox" class="kat-cb" value="mutfak"> Mutfak</label>


                                <label><input type="checkbox" class="kat-cb" value="calisma-odasi"> Çalışma Odası</label>


                                <label><input type="checkbox" class="kat-cb" value="banyo"> Banyo</label>


                            </div>


                        </div>


                        <div class="form-grup"><label>Ürün Adi</label><input type="text" id="yeni-urun-adi"></div>


                        <div class="form-grup"><label>Fiyat (TL)</label><input type="number" id="yeni-urun-fiyat"></div>


                        <div class="form-grup"><label>Sira No</label><input type="number" id="yeni-urun-sira" value="99"></div>


                        <div class="form-grup"><label style="display:flex; align-items:center; gap:8px; text-transform:none;"><input type="checkbox" id="yeni-urun-stok" style="width:18px; height:18px;" checked> Stokta Var</label></div>


                    </div>


                    <!-- Sag Kolon -->


                    <div>


                        <div class="form-grup"><label>Görselleri Bilgisayardan Seç</label><input type="file" id="yeni-urun-dosya" multiple accept="image/*"></div>


                        <div class="form-grup"><label>Link Ile Görsel Ekle</label><textarea id="yeni-urun-resimler" rows="2"></textarea></div>


                        <div class="form-grup"><label>Genel Açıklama</label><button class="bold-btn" onclick="metinKalinlastir('yeni-urun-aciklama')"><b>B</b> Kalin Yap</button><textarea id="yeni-urun-aciklama" rows="3"></textarea></div>


                        <div class="form-grup"><label>Özellikler (Satır satır)</label><button class="bold-btn" onclick="metinKalinlastir('yeni-urun-ozellikler')"><b>B</b> Kalın Yap</button><textarea id="yeni-urun-ozellikler" rows="3"></textarea></div>


                    </div>


                </div>


                <button class="btn-satin-al" onclick="urunEkle()" style="margin-top:20px;">Ürün Ekle</button>


            </div>


            <div class="tablo-kaydir">


                <table class="tasarim-tablo">


                    <thead><tr><th>Sira</th><th>Ürün</th><th>Kategoriler</th><th>Fiyat</th><th>Islem</th></tr></thead>


                    <tbody id="admin-urun-listesi"></tbody>


                </table>


            </div>


        </div>


    </div>





    <div id="tab-ayarlar" class="admin-tab-icerik">


        <div class="form-kutu" style="max-width:1000px; display:grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;">


            <!-- SOL KOLON -->


            <div>


                <h3>Genel ve Yeni Özellikler</h3>


                <div class="form-grup">


                    <label>Site Menü ve Vitrin Düzeni</label>


                    <select id="ayar-site-duzeni" style="width:100%; margin-bottom:10px;">


                        <option value="1">Düzen 1 (Yeni 3'lü Vitrin ve Menü)</option>


                        <option value="2">Düzen 2 (Klasik 4'lü Vitrin ve Menü)</option>


                    </select>


                </div>


                <label class="switch-label"><input type="checkbox" id="ayar-arama"> Akilli Arama Kutusu Aktif</label>


                <label class="switch-label"><input type="checkbox" id="ayar-filtre"> Ürün Filtreleme Aktif</label>


                <label class="switch-label"><input type="checkbox" id="ayar-wp"> WhatsApp Butonu Aktif</label>


                <div class="form-grup" style="margin-top:10px;"><input type="text" id="ayar-wp-no" placeholder="WhatsApp Numarasi (Örn: 905551234567)"></div>


                <div class="form-grup">


                    <label>Varsayılan Ana Sayfa (Site Açılışı))</label>


                    <select id="ayar-anasayfa" style="width:100%;">


                        <option value="index.html">Klasik Vitrin (4'lü Ekran)</option>


                        <option value="katalog.html">Mağaza (Tüm Ürünler)</option>


                        <option value="kategori.html">Ürünler (Kategori Seçimli)</option>


                        <option value="projelerimiz.html">Projeler</option>


                    </select>


                </div>


                <hr class="admin-ayrac">


                <h3>Vitrin Özellikleri</h3>


                <label class="switch-label"><input type="checkbox" id="ayar-satis"> Satış & Sepet Özelliği Aktif</label>


                <label class="switch-label"><input type="checkbox" id="ayar-fiyat-gizle"> Ürün Fiyatlarını Gizle</label>


            </div>


            


            <!-- SAG KOLON -->


            <div>


                <h3>Yorumlar ve Puanlama</h3>


                <label class="switch-label"><input type="checkbox" id="ayar-yorum-goster"> Müşteri Yorumlarını Göster</label>


                <label class="switch-label"><input type="checkbox" id="ayar-puan-goster"> Ürünlerde Yıldız Puanını Göster</label>


                <label class="switch-label"><input type="checkbox" id="ayar-yorum-yapma"> Yeni Yorum Yapilmasina Izin Ver</label>


                <hr class="admin-ayrac">


                <h3>Menü Görünürlüğü (Kapat/Aç)</h3>


                <label class="switch-label"><input type="checkbox" id="ayar-magaza"> Mağaza Sekmesi</label>


                <label class="switch-label"><input type="checkbox" id="ayar-urunler"> Ürünler Sekmesi</label>


                <label class="switch-label"><input type="checkbox" id="ayar-siparislerim"> Siparişlerim Sekmesi</label>


                <label class="switch-label"><input type="checkbox" id="ayar-takip"> Sipariş Takip</label>


                <label class="switch-label"><input type="checkbox" id="ayar-hakkimizda">HAKKIMIZDA</label>


                <label class="switch-label"><input type="checkbox" id="ayar-iletisim"> İletişim</label>


                <label class="switch-label"><input type="checkbox" id="ayar-projeler"> Projeler</label>


                <label class="switch-label"><input type="checkbox" id="ayar-kapaklar"> Kapaklar</label>


                


                <button class="btn-satin-al" style="margin-top:30px; width:100%; padding:15px;" onclick="ayarlariKaydet()">Ayarlari Kaydet</button>


            </div>


        </div>


    </div>





    <div id="tab-musteriler" class="admin-tab-icerik">


        <div class="form-kutu">


            <h3 style="margin-bottom:16px;">Sistemdeki Müşteriler ve Siparişler</h3>


            <div class="tablo-kaydir">


                <table class="tasarim-tablo">


                    <thead><tr><th>Kullanici</th><th>Ad Soyad</th><th>Sipariş Yönetimi</th><th>Yetki Ver/Al</th><th>Hesap İşlemi</th></tr></thead>


                    <tbody id="admin-musteri-listesi"></tbody>


                </table>


            </div>


        </div>


    </div>


</main>






    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-init.js"></script>
    
<script src="../js/data.js"></script>


<script src="../js/layout.js"></script>


<script src="../js/ui.js"></script>


<script src="../js/auth.js"></script>


<script src="../js/admin.js"></script>


<script src="../js/shop.js"></script>


<script src="../js/projects.js"></script>


<script src="../js/products.js"></script>


<script src="../js/effects.js"></script>


<script src="../js/app.js"></script>


</body>


</html>
